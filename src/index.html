<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anki 记忆卡片</title>
    <!-- Modern Fonts from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="main.js" defer></script>
  </head>

  <body>
    <!-- Synchronous routing script to avoid visual flash -->
    <script>
      try {
        const { getCurrentWindow } = window.__TAURI__.window;
        const label = getCurrentWindow().label;
        if (label === 'reminder') {
          document.body.className = 'route-reminder';
        } else {
          document.body.className = 'route-main';
        }
      } catch (e) {
        console.error('Synchronous routing failed:', e);
        document.body.className = 'route-main';
      }
    </script>
    
    <!-- ================= MAIN VIEW ================= -->
    <div id="main-view" class="view-container">
      <!-- Left Sidebar -->
      <aside class="sidebar">
        <header class="app-header">
          <div class="logo-wrap">
            <svg class="icon-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" />
              <path d="M12 6v6l4 2" />
            </svg>
            <h1>AnkiCard</h1>
          </div>
          <span class="badge-version">v2.0</span>
        </header>
        <input type="file" id="import-file-input" accept=".txt,.md" style="display: none;" />

        <!-- Search and Sort controls -->
        <div class="controls-section">
          <div class="search-bar">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" id="search-input" placeholder="搜索卡片问题或答案..." />
          </div>

          <div class="sort-bar">
            <div class="sort-label-and-tabs">
              <span class="label-sort">排序:</span>
              <div class="sort-tabs">
                <button id="sort-depth-asc-btn" class="sort-tab active" data-sort="depth-asc">由低到高</button>
                <button id="sort-depth-desc-btn" class="sort-tab" data-sort="depth-desc">由高到低</button>
              </div>
            </div>
            <button id="batch-toggle-btn" class="btn-batch-toggle">批量管理</button>
          </div>
        </div>

        <!-- Cards List -->
        <div class="card-list-wrapper">
          <ul id="cards-list" class="cards-list-ul">
            <!-- Dynamically populated -->
          </ul>
        </div>

        <!-- Batch Action Bar -->
        <div id="batch-action-bar" class="batch-action-bar">
          <div class="batch-info-row">
            <span class="batch-select-info">已选择 <strong id="batch-select-count">0</strong> 张卡片</span>
            <button id="batch-select-all-btn" class="btn-batch-link">全选</button>
          </div>
          <div class="batch-buttons-row">
            <button id="batch-cancel-btn" class="btn-action">取消</button>
            <button id="batch-delete-btn" class="btn-action btn-danger">批量删除</button>
          </div>
        </div>

        <!-- Timer settings at the bottom of sidebar -->
        <footer class="sidebar-timer-config">
          <div class="timer-title-row">
            <h3>定时复习</h3>
            <label class="switch">
              <input type="checkbox" id="timer-toggle-switch" checked>
              <span class="slider"></span>
            </label>
          </div>
          
          <div class="timer-body">
            <div class="timer-input-row">
              <span class="timer-label">提醒间隔:</span>
              <div class="number-input-wrap">
                <input type="number" id="timer-interval-input" min="1" value="10" style="width: 55px;" />
                <select id="timer-unit-select" class="unit-select">
                  <option value="mins">分钟</option>
                  <option value="secs">秒</option>
                </select>
              </div>
            </div>
            
            <div class="countdown-row">
              <span class="countdown-bullet"></span>
              <span id="countdown-status">正在计算下次提醒时间...</span>
            </div>
            </div>
        </footer>
      </aside>

      <!-- Right Detail Pane -->
      <main class="content-pane">
        <!-- Default Empty State -->
        <div id="empty-detail-state" class="detail-state-view active">
          <div class="empty-animation-wrap">
            <svg class="brain-glow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.44 2.5 2.5 0 0 1 0-3.12 3 3 0 0 1 0-3.88 2.5 2.5 0 0 1 0-3.12A2.5 2.5 0 0 1 9.5 2z" />
              <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.44 2.5 2.5 0 0 0 0-3.12 3 3 0 0 0 0-3.88 2.5 2.5 0 0 0 0-3.12A2.5 2.5 0 0 0 14.5 2z" />
            </svg>
            <h2>开始高效记忆</h2>
            <p>在左侧选择一张卡片来查看它的详细内容，或者点击下方的按钮创建一张新的记忆卡片。</p>
          </div>
        </div>

        <!-- Card Detail View -->
        <div id="card-detail-view" class="detail-state-view">
          <div class="detail-header">
            <div class="card-stats">
              <span class="stat-badge">
                <span class="stat-dot depth-dot"></span>
                记忆深度: <strong id="detail-depth-val">0%</strong>
              </span>
              <span class="stat-badge">
                <span class="stat-dot interval-dot"></span>
                弹出次数: <strong id="detail-popups-val">0</strong>
              </span>
              <span class="stat-badge">
                <span class="stat-dot remember-dot"></span>
                记得次数: <strong id="detail-remembers-val">0</strong>
              </span>
            </div>
            <div class="action-buttons">
              <button id="edit-card-btn" class="btn-action">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 20h9" />
                  <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                </svg>
                编辑
              </button>
              <button id="delete-card-btn" class="btn-action btn-danger">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6" />
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                </svg>
                删除
              </button>
            </div>
          </div>

          <div class="detail-content">
            <section class="detail-section detail-front-box">
              <h3>问题 (正面)</h3>
              <div id="detail-front-text" class="card-text-container"></div>
            </section>
            
            <section class="detail-section detail-back-box">
              <h3>答案 (背面)</h3>
              <div id="detail-back-text" class="card-text-container"></div>
            </section>
          </div>


        </div>
      </main>

      <!-- Floating Actions -->
      <div class="float-actions-wrap">
        <button id="import-cards-btn" class="btn-float btn-import-cards">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          一键导入卡片
        </button>
        <button id="add-card-float-btn" class="btn-float btn-add-card">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          添加记忆卡片
        </button>
      </div>
    </div>

    <!-- ================= REMINDER POPUP VIEW ================= -->
    <div id="reminder-view" class="view-container">
      <div class="reminder-window-container">
        
        <!-- Active Review State -->
        <div id="reminder-active-state" class="reminder-state active">
          <header class="popup-header">
            <div class="popup-title">
              <span class="pulse-dot"></span>
              <span>AnkiCard 复习提醒</span>
            </div>
            <span id="popup-queue-badge" class="queue-badge">剩余 0 张</span>
          </header>

          <div class="card-flip-perspective">
            <div id="flip-card-inner" class="card-flip-inner">
              
              <!-- FRONT FACE -->
              <div class="card-face card-face-front">
                <div class="face-header">
                  <span class="face-title-label">问题</span>
                  <span id="popup-depth-badge" class="depth-badge">深度 0</span>
                </div>
                <div class="face-body">
                  <p id="popup-front-text"></p>
                </div>
                <div class="face-footer">
                  <button id="view-answer-btn" class="btn-primary-gradient">
                    查看答案
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                      <polyline points="9 18 15 12 9 6" />
                    </svg>
                  </button>
                </div>
              </div>

              <!-- BACK FACE -->
              <div class="card-face card-face-back">
                <div class="face-header">
                  <span class="face-title-label text-success">答案</span>
                </div>
                <div class="face-body">
                  <div class="face-body-front-part">
                    <span class="small-label">问题:</span>
                    <p id="popup-back-question-ref"></p>
                  </div>
                  <hr class="card-divider" />
                  <div class="face-body-back-part">
                    <span class="small-label">答案:</span>
                    <p id="popup-back-text"></p>
                  </div>
                </div>
                <div class="face-footer split-buttons">
                  <button id="forget-btn" class="btn-action btn-forget">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="12" cy="12" r="10" />
                      <line x1="15" y1="9" x2="9" y2="15" />
                      <line x1="9" y1="9" x2="15" y2="15" />
                    </svg>
                    不记得
                  </button>
                  <button id="remember-btn" class="btn-action btn-remember">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="12" cy="12" r="10" />
                      <polyline points="9 11 11 13 15 9" />
                    </svg>
                    记得
                  </button>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>


    <!-- ================= ADD / EDIT CARD MODAL ================= -->
    <div id="card-modal" class="modal-overlay">
      <div class="modal-window">
        <header class="modal-header">
          <h2 id="modal-title">添加记忆卡片</h2>
          <button id="close-modal-btn" class="btn-close-modal">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </header>
        
        <form id="card-form" class="modal-body">
          <input type="hidden" id="modal-card-id" value="" />
          
          <div class="form-group">
            <label for="card-front-input">问题 (正面)</label>
            <textarea id="card-front-input" placeholder="输入要记忆的问题、词汇或概念..." required rows="3"></textarea>
          </div>
          
          <div class="form-group">
            <label for="card-back-input">答案 (背面)</label>
            <textarea id="card-back-input" placeholder="输入对应的详细解答、释义或说明..." required rows="4"></textarea>
          </div>
          
          <div class="modal-footer">
            <button type="button" id="modal-cancel-btn" class="btn-action">取消</button>
            <button type="submit" id="modal-save-btn" class="btn-primary-gradient">保存卡片</button>
          </div>
        </form>
      </div>
    </div>

  </body>
</html>
